name: 'Shieldly — AI-Powered Security Analysis'
description: 'AI-Powered security analysis for AWS IAM policies and CloudFormation templates. Fails the build on severity threshold.'
author: 'Shieldly'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api-key:
    description: 'Shieldly API key (sk_live_...). Required for AI analysis — create an API key (Builder plan or above) at https://www.shieldly.io/app/api and store it as a repo secret. Demo mode is not available in CI. Not needed when agent-scan is true (offline mode).'
    required: false
    default: ''
  scan-path:
    description: >
      Directory or file to scan. Point at your IaC output directory after your deploy/synth step —
      CDK writes to ./cdk.out (after cdk synth or cdk deploy), Serverless Framework writes to
      ./.serverless (after serverless package or deploy). Also accepts a direct .json/.yaml file path.
      When no IaC files are found, the action posts an informational PR comment and exits cleanly
      rather than failing the workflow.
    required: false
    default: '.'
  fail-on-severity:
    description: 'Fail the workflow if any finding is at or above this severity. Options: Critical, High, Medium, Low, none'
    required: false
    default: 'High'
  post-pr-comment:
    description: 'Post analysis results as a PR comment. Set to false to disable. Requires GITHUB_TOKEN with pull-requests: write permission.'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token used to post PR comments. Defaults to the GITHUB_TOKEN environment variable.'
    required: false
    default: ''
  api-url:
    description: 'Shieldly API base URL (override for self-hosted or dev).'
    required: false
    default: 'https://api.shieldly.io'
  agent-scan:
    description: >
      Set to true to run the Agent Blast-Radius scan instead of AI analysis: shows what
      your AI agents' AWS credentials could destroy, exfiltrate, or escalate to.
      Runs fully offline via @shieldly/cli — no API key required.
    required: false
    default: 'false'
  agent-scan-path:
    description: 'agent-scan mode: IAM policy JSON file to scan. Omit to auto-discover agent configs (.mcp.json etc.) in the workspace.'
    required: false
    default: ''
  budget-file:
    description: 'agent-scan mode: permission-budget file (shieldly.policy.yml). The workflow fails when the scan exceeds the declared budget.'
    required: false
    default: ''
  sarif-file:
    description: >
      Path to write a SARIF 2.1.0 report of the findings (e.g. shieldly.sarif). Upload it with
      github/codeql-action/upload-sarif to surface findings in your repository Security tab
      (code scanning). Requires the workflow permission security-events: write for the upload
      step. Empty (default) disables SARIF output.
    required: false
    default: ''

outputs:
  score:
    description: 'Security score (0-100) from the analysis.'
    value: ${{ steps.analyze.outputs.score }}
  risk-level:
    description: 'Overall risk level: Critical, High, Medium, or Low.'
    value: ${{ steps.analyze.outputs.risk-level }}
  findings-count:
    description: 'Total number of findings returned.'
    value: ${{ steps.analyze.outputs.findings-count }}
  critical-count:
    description: 'Number of Critical severity findings.'
    value: ${{ steps.analyze.outputs.critical-count }}
  sarif-file:
    description: 'Path of the SARIF report written (empty when sarif-file input is not set).'
    value: ${{ steps.analyze.outputs.sarif-file }}

runs:
  using: 'node24'
  main: 'dist/index.js'
